# Configuration for flu-usher pipeline

# General settings
threads: 12

# Input directories containing GISAID data
input_dirs:
  - "data/H1N1"
  - "data/H3N2"
  - "data/H5N1"
  - "data/H7N9"
  - "data/H9N2"
  - "data/H1NX"
  - "data/H2NX"
  - "data/H3NX"
  - "data/H4NX"
  - "data/H5NX"
  - "data/H6NX"
  - "data/H7NX"
  - "data/H8NX"
  - "data/H9NX"
  - "data/H10NX"
  - "data/H11NX"
  - "data/H12NX"
  - "data/H13NX"
  - "data/H14NX"
  - "data/H15NX"

# Segments to analyze
segments:
  - "PB2"
  - "PB1"
  - "PA"
  - "HA"
  - "NP"
  - "NA"
  - "MP"
  - "NS"

# List of HA and NA subtypes to take through the entire pipeline
ha_subtypes:
  - "H1"
  - "H3"
  - "H5"
  - "H7"
  - "H9"

na_subtypes:
  - "N1"
  - "N2"
  - "N6"
  - "N8"
  - "N9"

# Reference accession numbers for each segment-subtype combination
references:
  # HA references by subtype
  "HA_H1": "LN867357.1" # A/England/414/2010 (close to A/California/07/2009, but with no ambiguous nts)
  "HA_H3": "KF874500.2" # A/Aichi/2/1968
  "HA_H5": "NC_007362.1" # A/goose/Guangdong/1/1996
  "HA_H7": "NC_026425.1" # A/Shanghai/02/2013
  "HA_H9": "NC_004908.1" # A/Hong Kong/1073/99

  # NA references by subtype
  "NA_N1": "NC_002018.1" # A/Puerto Rico/8/1934
  "NA_N2": "CY121119.1" # A/Aichi/2/1968
  "NA_N6": "KP732684.1" # A/duck/Eastern China/S0322/2014
  "NA_N8": "L06575.1" # A/Duck/Memohis/928/74
  "NA_N9": "NC_026429.1" # A/Shanghai/02/2013

  # Other segments (using H3N2 A/Aichi/2/1968 as reference for all)
  "PB2_all": "CY121124.1"
  "PB1_all": "CY121123.1"
  "PA_all": "CY121122.1"
  "NP_all": "CY121120.1"
  "MP_all": "CY121118.1"
  "NS_all": "CY121121.1"

# Parameters for sequence curation
max_frac_gaps: 0.03
max_frac_ambig: 0.00

# Number of randomizations for alignment reordering
n_randomizations: 10

# Tree rerooting configuration
# Strategy: Use early avian sequences to root trees
# Format: "SEGMENT_SUBTYPE": "new_root_node"
# Combinations not listed here will not be rerooted
reroot:
  "HA_H1": "EPI_ISL_5897"
  "HA_H3": "EPI_ISL_18852459"
  "HA_H5": "EPI_ISL_5886"
  "HA_H7": "EPI_ISL_10304"
  "HA_H9": "EPI_ISL_3214"
  "NA_N1": "EPI_ISL_5878"
  "NA_N2": "EPI_ISL_8017"
  "NA_N9": "EPI_ISL_87301"
  "PB2_all": "EPI_ISL_5886"
  "PB1_all": "EPI_ISL_5886"
  "PA_all": "EPI_ISL_5886"
  "NP_all": "EPI_ISL_5886"
  "MP_all": "EPI_ISL_5886"
  "NS_all": "EPI_ISL_5886"

# Geographic subtree extraction
geographic_groups_to_extract:
  - "north_america"
  - "europe"
  - "asia"

# Temporal subtree extraction (per-tree median date split)
temporal_groups_to_extract:
  - "early"
  - "late"
