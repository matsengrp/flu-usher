# Configuration for flu-usher pipeline

# General settings
threads: 12

# Input directories containing GISAID data
input_dirs:
  - "data/H1N1"
  - "data/H3N2"
  - "data/H5N1"
  - "data/H7N9"
  - "data/H9N2"

# Segments to analyze
segments:
  - "PB2"
  - "PB1"
  - "PA"
  - "HA"
  - "NP"
  - "NA"
  - "MP"
  - "NS"

# Expected HA and NA subtypes
ha_subtypes:
  - "H1"
  - "H3"
  - "H5"
  - "H7"
  - "H9"

na_subtypes:
  - "N1"
  - "N2"
  - "N9"

# Reference accession numbers for each segment-subtype combination
references:
  # HA references by subtype
  "HA_H1": "NC_026433.1"
  "HA_H3": "NC_007366.1"
  "HA_H5": "NC_007362.1"
  "HA_H7": "NC_026425.1"
  "HA_H9": "NC_004908.1"
  
  # NA references by subtype
  "NA_N1": "NC_026434.1"
  "NA_N2": "NC_007368.1"
  "NA_N9": "NC_026429.1"
  
  # Other segments (using H1N1 as reference for all)
  "PB2_all": "NC_026438.1"
  "PB1_all": "NC_026435.1"
  "PA_all": "NC_026437.1"
  "NP_all": "NC_026436.1"
  "MP_all": "NC_026431.1"
  "NS_all": "NC_026432.1"

# Parameters for sequence curation
max_frac_gaps: 0.05
max_frac_ambig: 0.01

